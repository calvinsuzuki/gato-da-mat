name: Generate image manifest

on:
  push:
    branches: [main]
    paths:
      - 'images/**'
      - '.github/workflows/manifest.yml'
      - 'scripts/generate-manifest.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: pip install --quiet pillow

      - name: Generate images.json
        run: python3 scripts/generate-manifest.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images.json images/thumbs || true
          if git diff --staged --quiet; then
            echo "No manifest changes."
          else
            git commit -m "chore: regenerate image manifest"
            git push
          fi
